name: Restore __init__.py

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and restore file
        run: |
          curl -L -o plugins.v2/feishubot/__init__.py "https://p-mira-img-sign-sgnontt.byteintl.net/tos-mya-i-xobrcjvdq7/67e84dd90f744662a8bd3a7b4f87a773.py~tplv-xobrcjvdq7-image.image?lk3s=3523e930&x-orig-authkey=miraorigin&x-orig-expires=1775127600&x-orig-sign=VGiTB1EaoxbE3JursDQpJC7g9vw%3D"
          echo "File size: $(wc -c < plugins.v2/feishubot/__init__.py)"
          echo "MD5: $(md5sum plugins.v2/feishubot/__init__.py | cut -d' ' -f1)"
          # Verify MD5
          EXPECTED_MD5="e0f7aa1a7bc340744f2ae09103a7b205"
          ACTUAL_MD5=$(md5sum plugins.v2/feishubot/__init__.py | cut -d' ' -f1)
          if [ "$ACTUAL_MD5" != "$EXPECTED_MD5" ]; then
            echo "ERROR: MD5 mismatch! Expected $EXPECTED_MD5, got $ACTUAL_MD5"
            exit 1
          fi
          echo "MD5 verified successfully!"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins.v2/feishubot/__init__.py
          git commit -m "fix: 恢复 __init__.py 并应用 v5.1.1 修复

          - 修复 _agent_dispatch 中 _user_processing 未设 True 的 BUG
          - 增强 System Prompt 上下文理解指令
          - 优化 _tool_download_resource 缓存缺失提示
          - 版本号同步至 5.1.1"
          git push
